<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Order | KETTYSCENT</title>
    <meta name="description" content="Track your KETTYSCENT order by tracking ID and phone number." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="border-b border-white/10 bg-black/45 backdrop-blur">
      <nav class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <a href="/" class="text-xl font-semibold uppercase tracking-[0.35em] text-gold">KETTYSCENT</a>
        <div class="flex items-center gap-4">
          <a href="/" class="text-sm text-white/75 transition hover:text-gold">Home</a>
          <a href="/checkout.html" class="text-sm text-white/75 transition hover:text-gold">Checkout</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-5xl px-6 py-12">
      <section class="glass-panel gold-border rounded-[2rem] p-6 md:p-8">
        <p class="text-sm uppercase tracking-[0.35em] text-gold">Order Tracking</p>
        <h1 class="mt-3 text-3xl font-semibold text-white">Track your order</h1>
        <p class="mt-3 text-white/70">Enter your tracking ID and phone number used during checkout.</p>

        <form id="track-order-form" class="mt-6 grid gap-4 md:grid-cols-3">
          <input id="track-id" class="form-input md:col-span-1" type="text" placeholder="Tracking ID (KTS-...)" required />
          <input id="track-phone" class="form-input md:col-span-1" type="tel" placeholder="Phone number" required />
          <button class="rounded-full bg-gold px-6 py-3 text-sm font-semibold uppercase tracking-[0.25em] text-black transition hover:brightness-110 md:col-span-1" type="submit">Track</button>
        </form>

        <div id="track-result" class="mt-6"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
